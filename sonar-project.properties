sonar.organization=fabianportillo1996
sonar.projectKey=FabianPortillo1996_universe-monorepo

sonar.sources=apps/,packages/

sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  **/storybook-static/**,\
  **/.storybook/**,\
  **/*.config.ts,\
  **/*.config.js,\
  **/*.config.mjs,\
  **/*.d.ts

