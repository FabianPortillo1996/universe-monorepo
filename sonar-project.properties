  **/__tests__/**,\
  **/vitest.setup.*,\
  **/*.stories.tsx

sonar.javascript.lcov.reportPaths=apps/docs-web/coverage/lcov.info

sonar.inclusions=**/*.ts,**/*.tsx

sonar.qualitygate.wait=true
